experiment:
  name: exp011_yolo11n_aug
  seed: 42

data:
  source: kaggle+aihub   # Kaggle train(56) + AIHub 조합[1,3] 증강 (val은 Kaggle 대표셋 고정)
  aihub_combos: [1, 3]
  subset: full
  test_size: 0.2
  img_size: 640

model:
  type: yolo
  name: yolo11n          # 데이터가 늘면 yolo11s/m도 시도 가치 있음
  pretrained: true

training:
  epochs: 60
  batch_size: 16
  optimizer: SGD
  lr: 0.01
  weight_decay: 0.0005
