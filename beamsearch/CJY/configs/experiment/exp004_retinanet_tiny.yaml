experiment:
  name: exp004_retinanet_tiny
  seed: 42

data:
  subset: tiny
  test_size: 0.2
  img_size: 640

model:
  type: torchvision
  name: retinanet_resnet50
  pretrained: true

training:
  epochs: 60
  batch_size: 4
  optimizer: SGD
  lr: 0.005
  weight_decay: 0.0005
  momentum: 0.9
  scheduler: cosine
