experiment:
  name: exp016_yolo11n_aug_clean
  seed: 42

# exp011의 "그룹화 fix" 버전. exp011은 combo_group_key(조합 문자열)만으로
# train/val을 나눴는데, 감사 결과 val의 ~30%가 조합 문자열은 다르지만 같은
# 트레이/배경에서 약 1개만 바꿔 찍은 근접중복 사진으로 확인됐다(K-Fold 감사).
# 이 config은 build_leakage_safe_groups()로 근접중복까지 하나의 그룹으로
# 묶은 뒤 분할한 데이터로 학습한다 — exp011(0.9914)과 비교해 점수가 얼마나
# 내려가는지가 "누수로 부풀려진 정도"의 추정치가 된다. exp011은 비교용으로
# 그대로 남겨둔다(삭제하지 않음).
data:
  source: kaggle+aihub
  aihub_combos: [1, 3]
  subset: full
  test_size: 0.2
  img_size: 640
  leakage_safe_grouping: true   # build_leakage_safe_groups 사용 표시(정보성 필드)

model:
  type: yolo
  name: yolo11n
  pretrained: true

training:
  epochs: 30   # 모델 비교의 공정성을 위해 exp012~017과 동일 epoch으로 통일(원래 60)
  batch_size: 16
  optimizer: SGD
  lr: 0.01
  weight_decay: 0.0005
  resume: true
