experiment:
  name: exp020_yolo11n_kfold   # 노트북에서 fold별로 "_f{i}" suffix를 붙여 사용
  seed: 42

data:
  source: kaggle+aihub   # exp011과 동일 데이터 풀: Kaggle train(56) + AIHub 조합[1,3]
  aihub_combos: [1, 3]
  subset: full
  n_splits: 5             # 조합(group) 단위 K-Fold 개수
  img_size: 640

model:
  type: yolo
  name: yolo11n
  pretrained: true

training:
  # fold당 5번 학습해야 하므로 exp011(60epoch) 그대로 쓰면 총 학습량이 5배.
  # 누수/치팅 여부를 교차검증으로 "확인"하는 목적이라 완전 수렴보다 fold 간
  # 상대적 일관성이 중요 → epoch을 줄여 총 실행 시간을 관리.
  epochs: 30
  batch_size: 16
  optimizer: SGD
  lr: 0.01
  weight_decay: 0.0005
  resume: true
