experiment:
  name: exp021_yolo11n_kfold_clean   # 노트북에서 fold별로 "_f{i}" suffix를 붙여 사용
  seed: 42

# exp020의 "그룹화 fix" 버전. exp020(콤보 문자열 기준 분할)의 근접중복 감사에서
# fold마다 val의 28~35%(평균 32%)가 근접중복으로 확인됐다. 이 config은
# build_leakage_safe_groups()로 확장한 그룹 기준 K-Fold를 사용한다. exp020은
# "그룹화 전/후 점수 차이"를 보여주는 비교 기준으로 그대로 남겨둔다.
data:
  source: kaggle+aihub
  aihub_combos: [1, 3]
  subset: full
  n_splits: 5
  img_size: 640
  leakage_safe_grouping: true

model:
  type: yolo
  name: yolo11n
  pretrained: true

training:
  epochs: 30
  batch_size: 16
  optimizer: SGD
  lr: 0.01
  weight_decay: 0.0005
  resume: true
