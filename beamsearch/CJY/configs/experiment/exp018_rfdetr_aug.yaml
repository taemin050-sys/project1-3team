experiment:
  name: exp017_rfdetr_aug
  seed: 42

# Sparse R-CNN/DINO-DETR 대신 transformer 계열 대표로 추가.
# - Sparse R-CNN: torchvision/HuggingFace 어디에도 없음(Detectron2 전용, Mac/MPS 지원 불안정)
# - DINO-DETR: HuggingFace 미지원(요청 이슈만 있음), 공식 구현은 CUDA 전용 커스텀 커널 필요
# - RF-DETR: HuggingFace transformers에 있고, config.disable_custom_kernels 기본값이
#   True라 CUDA 컴파일 없이 순수 PyTorch로 Mac(MPS)/CPU에서도 동작(DINO가 기반으로
#   삼은 Deformable Attention 계열이라 "transformer 검출기"로서 대표성은 있음).
data:
  source: kaggle+aihub   # exp011/exp016과 동일 데이터: Kaggle train(56) + AIHub 조합[1,3]
  aihub_combos: [1, 3]
  subset: full
  test_size: 0.2
  img_size: 640           # 다른 torchvision 모델들과 동일 해상도로 통일

model:
  type: huggingface       # src/train_hf.py::train_rfdetr로 라우팅(다른 값과 다르게 처리됨)
  name: rf_detr
  checkpoint: Roboflow/rf-detr-base
  pretrained: true

training:
  epochs: 30              # exp011~017 모델 비교 공정성을 위해 전부 동일 epoch으로 통일
  batch_size: 4            # DINOv2 백본 + 300 쿼리라 무거움 — 우선 작은 배치로 시작
  accumulate_grad_batches: 2   # 유효 배치 8 정도로 보정(메모리 보고 조정할 것)
  optimizer: AdamW
  lr: 1.0e-4
  weight_decay: 1.0e-4
  resume: true             # exp017_rfdetr_aug_2ep.yaml과 experiment.name이 같으므로
                            # (동일 experiments/exp017_rfdetr_aug/ 디렉토리) 스모크 테스트
                            # 체크포인트가 있으면 이어서, 없으면 처음부터 학습한다.
