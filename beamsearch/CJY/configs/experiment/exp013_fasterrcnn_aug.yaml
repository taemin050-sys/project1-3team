experiment:
  name: exp013_fasterrcnn_aug
  seed: 42

data:
  source: kaggle+aihub   # exp011과 동일 데이터: Kaggle train(56) + AIHub 조합[1,3]
  aihub_combos: [1, 3]
  subset: full
  test_size: 0.2
  img_size: 640           # exp011(YOLO)과 동일 해상도로 통일 → mAP 비교 가능

model:
  type: torchvision
  name: fasterrcnn_resnet50
  pretrained: true

training:
  epochs: 30   # exp011~017 모델 비교 공정성을 위해 전부 동일 epoch으로 통일
  batch_size: 2
  optimizer: SGD
  lr: 0.005
  weight_decay: 0.0005
  momentum: 0.9
  scheduler: cosine
  warmup_epochs: 3
  # tiny(400장) 때는 과적합 방지를 위해 전체 60epoch 동안 backbone을 얼렸지만,
  # 이제 학습 데이터가 2800장+로 늘어(exp011 기준) 오래 얼릴 필요가 없음.
  freeze_backbone_epochs: 5
  unfreeze_backbone_lr: 1.0e-4
  resume: true