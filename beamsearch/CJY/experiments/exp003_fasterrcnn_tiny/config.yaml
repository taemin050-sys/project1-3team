data:
  img_size: 512
  subset: medium
  test_size: 0.2
experiment:
  name: exp003_fasterrcnn_tiny
  seed: 42
model:
  name: fasterrcnn_resnet50
  pretrained: true
  type: torchvision
training:
  batch_size: 2
  epochs: 20
  freeze_backbone_epochs: 20
  lr: 0.005
  momentum: 0.9
  optimizer: SGD
  scheduler: cosine
  unfreeze_backbone_lr: 0.0001
  warmup_epochs: 3
  weight_decay: 0.0005
