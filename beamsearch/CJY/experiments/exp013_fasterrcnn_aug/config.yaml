data:
  aihub_combos:
  - 1
  - 3
  img_size: 640
  source: kaggle+aihub
  subset: full
  test_size: 0.2
experiment:
  name: exp013_fasterrcnn_aug
  seed: 42
model:
  name: fasterrcnn_resnet50
  pretrained: true
  type: torchvision
training:
  batch_size: 2
  epochs: 30
  freeze_backbone_epochs: 5
  lr: 0.005
  momentum: 0.9
  optimizer: SGD
  scheduler: cosine
  unfreeze_backbone_lr: 0.0001
  warmup_epochs: 3
  weight_decay: 0.0005
