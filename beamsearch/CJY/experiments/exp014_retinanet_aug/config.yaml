data:
  aihub_combos:
  - 1
  - 3
  img_size: 640
  source: kaggle+aihub
  subset: full
  test_size: 0.2
experiment:
  name: exp014_retinanet_aug
  seed: 42
model:
  name: retinanet_resnet50
  pretrained: true
  type: torchvision
training:
  batch_size: 4
  epochs: 30
  lr: 0.005
  momentum: 0.9
  optimizer: SGD
  resume: true
  scheduler: cosine
  weight_decay: 0.0005
