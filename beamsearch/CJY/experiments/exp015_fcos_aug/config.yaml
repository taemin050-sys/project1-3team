data:
  aihub_combos:
  - 1
  - 3
  img_size: 512
  source: kaggle+aihub
  subset: full
  test_size: 0.2
experiment:
  name: exp015_fcos_aug
  seed: 42
model:
  name: fcos_resnet50
  pretrained: true
  type: torchvision
training:
  accumulate_grad_batches: 2
  batch_size: 2
  epochs: 30
  freeze_backbone_epochs: 3
  lr: 0.005
  momentum: 0.9
  optimizer: SGD
  resume: true
  scheduler: cosine
  unfreeze_backbone_lr: 0.0001
  weight_decay: 0.0005
